name: Deploy Application

on:
  push:
    branches:
      - production

concurrency:
  group: production-deployment
  cancel-in-progress: true

jobs:
  deploy-application:
    runs-on: ubuntu-latest

    steps:
      ##################################################
      # CHECKOUT
      ##################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ##################################################
      # UPDATE REPOSITORY ON SERVER
      ##################################################

      - name: Clone or Update Repository
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e

            PROJECT_NAME="oasis-ascend"
            PROJECT_DIR="/home/ubuntu/${PROJECT_NAME}"

            if [ ! -d "${PROJECT_DIR}/.git" ]; then
              git clone \
                https://github.com/Sartaj-Ashraf/OasisNewWebsite.git \
                "${PROJECT_DIR}"
            else
              cd "${PROJECT_DIR}"
              git fetch origin
              git reset --hard origin/production
            fi

      ##################################################
      # OPTIONAL BUILD VALIDATION
      ##################################################

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      ##################################################
      # CONFIGURE SERVER
      ##################################################

      - name: Configure Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e

            ##################################################
            # PROJECT CONFIGURATION
            ##################################################

            PROJECT_NAME="oasis-ascend"
            PROJECT_DIR="/home/ubuntu/${PROJECT_NAME}"

            BACKEND_DIR="${PROJECT_DIR}/backend"
            FRONTEND_DIR="${PROJECT_DIR}/frontend"

            BACKEND_PROCESS="${PROJECT_NAME}-be"
            FRONTEND_PROCESS="${PROJECT_NAME}-fe"

            echo "Deploying ${PROJECT_NAME}"

            ##################################################
            # LOAD NVM
            ##################################################

            export NVM_DIR="$HOME/.nvm"

            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            fi

            echo "Node Version:"
            node -v

            echo "NPM Version:"
            npm -v

            echo "PM2 Version:"
            pm2 -v

            ##################################################
            # BACKEND ENV
            ##################################################

            if [ ! -f "${BACKEND_DIR}/.env" ]; then

              echo "Creating backend .env"

              cat > "${BACKEND_DIR}/.env" <<EOF
              PORT=5000
              NODE_ENV=${{ secrets.NODE_ENV }}

            MONGO_URL=${{ secrets.MONGO_URL }}

            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}

            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}

            CLIENT_URL=${{ secrets.CLIENT_URL }}

            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            EOF

            else
              echo "Backend .env already exists"
            fi

            ##################################################
            # FRONTEND ENV (OPTIONAL)
            ##################################################

            # if [ ! -f "${FRONTEND_DIR}/.env" ]; then
            #
            #   cat > "${FRONTEND_DIR}/.env" <<EOF
            # NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            # EOF
            #
            # fi

            ##################################################
            # BACKEND DEPLOYMENT
            ##################################################

            cd "${BACKEND_DIR}"

            npm install --production

            if pm2 describe "${BACKEND_PROCESS}" >/dev/null 2>&1; then
              echo "Restarting ${BACKEND_PROCESS}"
              pm2 restart "${BACKEND_PROCESS}"
            else
              echo "Starting ${BACKEND_PROCESS}"
              PORT=5000 pm2 start server.js \
                --name "${BACKEND_PROCESS}"
            fi

            ##################################################
            # FRONTEND DEPLOYMENT
            ##################################################

            cd "${FRONTEND_DIR}"

            npm install

            npm run build

            if pm2 describe "${FRONTEND_PROCESS}" >/dev/null 2>&1; then
              echo "Restarting ${FRONTEND_PROCESS}"
              pm2 restart "${FRONTEND_PROCESS}"
            else
              echo "Starting ${FRONTEND_PROCESS}"
              PORT=3000 pm2 start npm \
                --name "${FRONTEND_PROCESS}" \
                -- start
            fi

            ##################################################
            # SAVE PM2 CONFIGURATION
            ##################################################

            pm2 save

            ##################################################
            # NGINX CONFIGURATION
            ##################################################


            NGINX_CONFIG="/etc/nginx/sites-available/${PROJECT_NAME}"

            if [ ! -f "${NGINX_CONFIG}" ]; then

              echo "Creating Nginx configuration"

              sudo tee "${NGINX_CONFIG}" > /dev/null <<'EOF'
            server {
                listen 80;
                server_name _;

                location / {
                    proxy_pass http://localhost:3000;
                    proxy_http_version 1.1;

                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                }

                location /api/ {
                    proxy_pass http://localhost:5000/api/;
                    proxy_http_version 1.1;

                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            EOF

              sudo ln -sf \
                "${NGINX_CONFIG}" \
                "/etc/nginx/sites-enabled/${PROJECT_NAME}"

              sudo rm -f /etc/nginx/sites-enabled/default

              sudo nginx -t
              sudo systemctl reload nginx

            else
              echo "Nginx configuration already exists"
            fi

