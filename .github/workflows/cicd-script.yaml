name: Production Deployment

on:
  push:
    branches:
      - build-test-alias

concurrency:
  group: production-deployment
  cancel-in-progress: true

env:
  APP_NAME: oasis-ascend
  NODE_VERSION: 22

jobs:

  ##########################################################
  # BUILD
  ##########################################################

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      ##########################################################
      # NODE
      ##########################################################

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      ##########################################################
      # DEBUG
      ##########################################################

      - name: Verify Repository Structure
        run: |
          echo "Current Directory:"
          pwd

          echo "Package Files:"
          find . -name package.json

          echo "Lock Files:"
          find . -name package-lock.json

      ##########################################################
      # BACKEND
      ##########################################################

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install 

      - name: Run Backend Tests
        working-directory: backend
        run: npm test --if-present

      ##########################################################
      # FRONTEND
      ##########################################################

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      ##########################################################
      # ARTIFACT
      ##########################################################

      - name: Create Deployment Artifact
        run: |
          set -e

          sudo mkdir release

          sudo cp -r backend release/backend
          sudo cp -r frontend/.next release/frontend

          tar -czf release.tar.gz release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-release
          path: release.tar.gz
          retention-days: 7

  ##########################################################
  # DEPLOY
  ##########################################################

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: application-release

      ##########################################################
      # COPY TO SERVER
      ##########################################################

      - name: Upload Release
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: release.tar.gz
          target: /tmp

      ##########################################################
      # DEPLOY
      ##########################################################

      - name: Deploy Release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |

            set -Eeuo pipefail

            APP_NAME="oasis-ascend"

            BASE_DIR="/var/www/${APP_NAME}"
            RELEASES_DIR="${BASE_DIR}/releases"
            SHARED_DIR="${BASE_DIR}/shared"
            CURRENT_LINK="${BASE_DIR}/current"

            TIMESTAMP=$(date +%Y%m%d%H%M%S)

            RELEASE_DIR="${RELEASES_DIR}/${TIMESTAMP}"

            sudo mkdir -p "${RELEASES_DIR}"
            sudo mkdir -p "${SHARED_DIR}"

            PREVIOUS_RELEASE=$(readlink -f "${CURRENT_LINK}" || true)

            echo "Previous Release:"
            echo "${PREVIOUS_RELEASE}"

            ####################################################
            # NODE ENVIRONMENT
            ####################################################

            export NVM_DIR="$HOME/.nvm"

            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            fi

            node -v
            npm -v

            ####################################################
            # NEW RELEASE
            ####################################################

            sudo mkdir -p "${RELEASE_DIR}"

            tar -xzf /tmp/release.tar.gz \
              -C "${RELEASE_DIR}"

            ####################################################
            # ENVIRONMENT FILE
            ####################################################

            cat > "${SHARED_DIR}/.env" <<EOF
            PORT=5000
            NODE_ENV=production

            MONGO_URL=${{ secrets.MONGO_URL }}

            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}

            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}

            CLIENT_URL=${{ secrets.CLIENT_URL }}

            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            EOF

            sudo ln -sfn \
              "${SHARED_DIR}/.env" \
              "${RELEASE_DIR}/release/backend/.env"

            ####################################################
            # BACKEND INSTALL
            ####################################################

            cd "${RELEASE_DIR}/release/backend"

            sudo npm install --omit=dev

            ####################################################
            # PM2 START / RELOAD
            ####################################################

            if pm2 describe oasis-backend >/dev/null 2>&1; then

              pm2 delete oasis-backend

            fi

            pm2 start server.js \
              --name oasis-backend \
              --update-env

            ####################################################
            # HEALTH CHECK
            ####################################################

            echo "Waiting for application..."

            sleep 15

            if ! curl -fsS http://127.0.0.1:5000/health; then

              echo "Health check failed."

              if [ -n "${PREVIOUS_RELEASE}" ]; then

                echo "Rolling back..."

                ln -sfn \
                  "${PREVIOUS_RELEASE}" \
                  "${CURRENT_LINK}"

              fi

              exit 1

            fi

            ####################################################
            # SWITCH RELEASE
            ####################################################

            ln -sfn \
              "${RELEASE_DIR}" \
              "${CURRENT_LINK}"

            ####################################################
            # PM2 PERSISTENCE
            ####################################################

            pm2 save

            sudo env PATH=$PATH:/home/ubuntu/.nvm/versions/node/$(node -v)/bin \
              pm2 startup systemd -u ubuntu --hp /home/ubuntu || true

            ####################################################
            # CLEAN OLD RELEASES
            ####################################################

            find "${RELEASES_DIR}" \
              -mindepth 1 \
              -maxdepth 1 \
              -type d \
              | sort -r \
              | tail -n +6 \
              | xargs -r rm -rf

            ####################################################
            # STATUS
            ####################################################

            pm2 status

            echo "Deployment Successful"