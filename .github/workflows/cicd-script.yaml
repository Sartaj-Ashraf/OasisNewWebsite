name: Production Deployment

on:
  push:
    branches:
      - build-test-alias

concurrency:
  group: production
  cancel-in-progress: true

env:
  APP_NAME: OasisNewWebsite

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      ################################################
      # BACKEND
      ################################################

      - name: Install Backend
        working-directory: backend
        run: npm ci

      - name: Run Backend Tests
        working-directory: backend
        run: npm test --if-present

      ################################################
      # FRONTEND
      ################################################

      - name: Install Frontend
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      ################################################
      # ARTIFACT
      ################################################

      - name: Create Artifact
        run: |
          mkdir deploy

          cp -r backend deploy/backend
          cp -r frontend/dist deploy/frontend

          tar -czf release.tar.gz deploy

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: release

      - name: Copy Artifact To Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: release.tar.gz
          target: /tmp

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -Eeuo pipefail

            APP_NAME="oasis-ascend"

            BASE_DIR="/var/www/${APP_NAME}"

            RELEASES_DIR="${BASE_DIR}/releases"
            SHARED_DIR="${BASE_DIR}/shared"

            TIMESTAMP=$(date +%Y%m%d%H%M%S)

            RELEASE_DIR="${RELEASES_DIR}/${TIMESTAMP}"

            CURRENT_LINK="${BASE_DIR}/current"

            mkdir -p "$RELEASES_DIR"
            mkdir -p "$SHARED_DIR"

            PREVIOUS_RELEASE=$(readlink -f "$CURRENT_LINK" || true)

            echo "Creating release $TIMESTAMP"

            mkdir -p "$RELEASE_DIR"

            tar -xzf /tmp/release.tar.gz -C "$RELEASE_DIR"

            #################################################
            # ENV
            #################################################

            cat > "${SHARED_DIR}/.env" <<EOF
            PORT=5000
            NODE_ENV=production

            MONGO_URL=${{ secrets.MONGO_URL }}

            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}

            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}

            CLIENT_URL=${{ secrets.CLIENT_URL }}

            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            EOF

            ln -sf \
              "${SHARED_DIR}/.env" \
              "${RELEASE_DIR}/deploy/backend/.env"

            #################################################
            # INSTALL BACKEND
            #################################################

            cd "${RELEASE_DIR}/deploy/backend"

            npm ci --omit=dev

            #################################################
            # PM2
            #################################################

            if pm2 describe oasis-backend >/dev/null 2>&1; then
              pm2 delete oasis-backend
            fi

            pm2 start server.js \
              --name oasis-backend \
              --update-env

            #################################################
            # HEALTH CHECK
            #################################################

            sleep 10

            if ! curl -f http://localhost:5000/health; then

              echo "Health check failed"

              if [ -n "$PREVIOUS_RELEASE" ]; then

                ln -sfn "$PREVIOUS_RELEASE" "$CURRENT_LINK"

                pm2 restart oasis-backend

              fi

              exit 1
            fi

            #################################################
            # ATOMIC SWITCH
            #################################################

            ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"

            #################################################
            # CLEANUP
            #################################################

            ls -dt ${RELEASES_DIR}/* \
              | tail -n +6 \
              | xargs rm -rf || true

            pm2 save