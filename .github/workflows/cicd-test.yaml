name: Production Deployment

on:
  push:
    branches:
      - build-test-alias

concurrency:
  group: production-deployment
  cancel-in-progress: true

env:
  APP_NAME: oasis-ascend
  NODE_VERSION: 22

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      ##################################################
      # BACKEND
      ##################################################

      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      - name: Run Backend Tests
        working-directory: backend
        run: npm test --if-present

      ##################################################
      # FRONTEND
      ##################################################

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      ##################################################
      # ARTIFACT
      ##################################################

      - name: Create Deployment Artifact
        run: |
          set -e

          mkdir -p release/backend
          mkdir -p release/frontend

          ################################################
          # Backend
          ################################################

          cp -r backend/* release/backend/

          ################################################
          # Frontend Standalone
          ################################################

          cp -r frontend/.next/standalone/* release/frontend/

          mkdir -p release/frontend/.next

          cp -r frontend/.next/static \
            release/frontend/.next/static

          if [ -d frontend/public ]; then
            cp -r frontend/public release/frontend/public
          fi

          tar -czf release.tar.gz release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-release
          path: release.tar.gz
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: application-release

      ##################################################
      # UPLOAD
      ##################################################

      - name: Upload Release
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: release.tar.gz
          target: /tmp

      ##################################################
      # DEPLOY
      ##################################################

      - name: Deploy Release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |

            set -Eeuo pipefail

            APP_NAME="oasis-ascend"

            BASE_DIR="/var/www/${APP_NAME}"
            RELEASES_DIR="${BASE_DIR}/releases"
            SHARED_DIR="${BASE_DIR}/shared"
            CURRENT_LINK="${BASE_DIR}/current"

            mkdir -p "${RELEASES_DIR}"
            mkdir -p "${SHARED_DIR}"

            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            RELEASE_DIR="${RELEASES_DIR}/${TIMESTAMP}"

            PREVIOUS_RELEASE=$(readlink -f "${CURRENT_LINK}" || true)

            echo "Previous Release:"
            echo "${PREVIOUS_RELEASE}"

            ################################################
            # NODE
            ################################################

            export NVM_DIR="$HOME/.nvm"

            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            fi

            node -v
            npm -v

            ################################################
            # EXTRACT RELEASE
            ################################################

            mkdir -p "${RELEASE_DIR}"

            tar -xzf /tmp/release.tar.gz \
              -C "${RELEASE_DIR}"

            ################################################
            # ENV
            ################################################

            cat > "${SHARED_DIR}/.env" <<EOF
            PORT=5000
            NODE_ENV=production

            MONGO_URL=${{ secrets.MONGO_URL }}

            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}

            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}

            CLIENT_URL=${{ secrets.CLIENT_URL }}

            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            EOF

            ################################################
            # BACKEND
            ################################################

            ln -sfn \
              "${SHARED_DIR}/.env" \
              "${RELEASE_DIR}/release/backend/.env"

            cd "${RELEASE_DIR}/release/backend"

            npm ci --omit=dev

            ################################################
            # ACTIVATE RELEASE
            ################################################

            ln -sfn "${RELEASE_DIR}" "${CURRENT_LINK}"

            ################################################
            # BACKEND PM2
            ################################################

            if pm2 describe oasis-backend >/dev/null 2>&1; then
              pm2 delete oasis-backend
            fi

            pm2 start \
              "${CURRENT_LINK}/release/backend/server.js" \
              --name oasis-backend

            ################################################
            # FRONTEND PM2
            ################################################

            if pm2 describe oasis-frontend >/dev/null 2>&1; then
              pm2 delete oasis-frontend
            fi

            PORT=3000 pm2 start \
              "${CURRENT_LINK}/release/frontend/server.js" \
              --name oasis-frontend

            ################################################
            # HEALTH CHECK
            ################################################

            echo "Waiting for services..."

            sleep 10

            if ! curl -fsS http://127.0.0.1:5000/health; then

              echo "Health check failed"

              if [ -n "${PREVIOUS_RELEASE}" ]; then

                echo "Rolling back..."

                ln -sfn \
                  "${PREVIOUS_RELEASE}" \
                  "${CURRENT_LINK}"

              fi

              exit 1

            fi

            ################################################
            # SAVE PM2
            ################################################

            pm2 save

            sudo env PATH=$PATH:/home/ubuntu/.nvm/versions/node/$(node -v)/bin \
              pm2 startup systemd \
              -u ubuntu \
              --hp /home/ubuntu || true

            ################################################
            # CLEANUP
            ################################################

            find "${RELEASES_DIR}" \
              -mindepth 1 \
              -maxdepth 1 \
              -type d \
              | sort -r \
              | tail -n +6 \
              | xargs -r rm -rf

            ################################################
            # STATUS
            ################################################

            pm2 status

            echo "Deployment Successful"